# Diji Platform - Docker Compose
# Scale instances: docker compose up --scale openclaw=5


services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: always

  router:
    build: ../gateway/router
    ports:
      - "4000:4000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MAX_USERS_PER_INSTANCE=500
    depends_on:
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../gateway/config/nginx-router.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - router
    restart: always

  openclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile.openclaw
    environment:
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPERMEMORY_API_KEY=${SUPERMEMORY_API_KEY}
      - SUPERMEMORY_BASE_URL=${SUPERMEMORY_BASE_URL:-https://api.supermemory.ai/v3}
      - MEMORY_INGEST_URL=${SUPERMEMORY_BASE_URL:-https://api.supermemory.ai/v3}/memories
      - MEMORY_SEARCH_URL=${SUPERMEMORY_BASE_URL:-https://api.supermemory.ai/v3}/search
      - MEMORY_API_KEY=${SUPERMEMORY_API_KEY}
      - COMPANION_SERVER_URL=http://companion-server:3950
      - COMPANION_DATA_DIR=/app/data
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
    ports:
      - "3100:3100"  # WhatsApp Cloud API webhook
      - "18850:18789"  # OpenClaw gateway WS + HTTP API (chat completions)
      - "18851:18809"  # OpenClaw gateway control UI
    depends_on:
      - redis
    volumes:
      # Per-instance user data — each replica gets its own volume
      - openclaw-userdata-${HOSTNAME:-default}:/root/.openclaw-companion/data/users
      # WeChat session files (host-mounted, contains login token)
      - /root/.openclaw-companion/openclaw-weixin:/root/.openclaw-companion/openclaw-weixin
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
    restart: always

  companion-server:
    build: ../server
    ports:
      - "3950:3950"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - SUPERMEMORY_API_KEY=${SUPERMEMORY_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - companion-data:/app/data
    depends_on:
      - redis
    restart: always

volumes:
  redis-data:
  companion-data:
  openclaw-userdata-default:
