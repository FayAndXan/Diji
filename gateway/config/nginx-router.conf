# Diji Gateway - nginx config
# All webhooks hit nginx, get forwarded to the diji-router
# which then routes to the correct OpenClaw instance

server {
    listen 443 ssl;
    server_name *.dijicorp.com;  # wildcard for all companions

    ssl_certificate /etc/letsencrypt/live/dijicorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dijicorp.com/privkey.pem;

    # Telegram webhook
    location /webhook/telegram {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Diji-Channel telegram;
    }

    # WhatsApp Cloud API webhook
    location /webhook/whatsapp {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Diji-Channel whatsapp;
    }

    # WeChat webhook
    location /webhook/wechat {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Diji-Channel wechat;
    }

    # Router stats/admin
    location /router/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_set_header Host $host;
        # TODO: restrict to admin IPs
    }

    # Landing pages (per-companion subdomain)
    location / {
        root /var/www/diji/$host;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
